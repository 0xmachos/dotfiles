# cargo-deny configuration — supply chain hardening
# Copy to project root: cp ~/Documents/Projects/dotfiles/templates/deny.toml .
# Run: cargo deny check
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "aarch64-apple-darwin",
]
all-features = true

# Advisory check — flag crates with known vulnerabilities or yanked versions
# https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
[advisories]
# "workspace" treats unmaintained crates as warnings in the workspace root
# but errors in dependencies — practical default for personal projects
unmaintained = "workspace"
ignore = []

# Licence check — only allow permissive licences
# https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

# ring uses a custom licence that is functionally ISC + OpenSSL
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# Ban check — block known-problematic crates, deny duplicate versions
# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { crate = "openssl", use-instead = "rustls" },
    { crate = "openssl-sys", use-instead = "rustls" },
]

# Source check — only allow crates.io, deny unknown registries and git sources
# https://embarkstudios.github.io/cargo-deny/checks/sources/cfg.html
[sources]
unknown-registry = "deny"
unknown-git = "deny"
